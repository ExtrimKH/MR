<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админка</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="logo">Админка</h1>
      <a class="admin-link" href="/">На сайт</a>
    </div>
  </header>

  <main class="container">
    <!-- Форма входа -->
    <section id="login-view" hidden>
      <div class="panel narrow">
        <h2>Вход</h2>
        <form id="login-form">
          <label>Пароль
            <input type="password" id="password" required autocomplete="current-password" />
          </label>
          <button type="submit">Войти</button>
          <p class="error" id="login-error" hidden></p>
        </form>
      </div>
    </section>

    <!-- Панель администратора -->
    <section id="admin-view" hidden>
      <div class="toolbar">
        <button id="logout-btn" class="secondary">Выйти</button>
      </div>

      <div class="panel">
        <h2>Блок «Что мы покупаем»</h2>
        <form id="info-form">
          <label>Каждая строка — отдельный пункт списка
            <textarea id="weBuy" rows="5" placeholder="Любая Epic запчасть — 0.01 $SOL"></textarea>
          </label>
          <p class="hint">Слова «Epic», «Legendary» и цены в $SOL подсветятся на сайте автоматически.</p>
          <button type="submit">Сохранить</button>
          <span class="saved" id="info-saved" hidden>Сохранено ✓</span>
        </form>
      </div>

      <div class="panel">
        <h2 id="product-form-title">Добавить товар</h2>
        <form id="product-form">
          <input type="hidden" id="edit-id" />
          <label>Название
            <input type="text" id="title" required />
          </label>
          <label>Цена в $SOL (только число)
            <input type="text" id="price" placeholder="например, 0.3" />
          </label>
          <label>Тип товара
            <select id="productType">
              <option value="None">None</option>
              <option value="Машина">Машина</option>
              <option value="Деталь">Деталь</option>
              <option value="Карточка">Карточка</option>
            </select>
          </label>
          <label>Тип детали
            <select id="partType">
              <option value="None">None</option>
              <option value="Roof">Roof</option>
              <option value="Headlights">Headlights</option>
              <option value="Grill">Grill</option>
              <option value="Rims">Rims</option>
              <option value="Hood">Hood</option>
              <option value="Sideskirts">Sideskirts</option>
              <option value="Mirrors">Mirrors</option>
              <option value="Fenders">Fenders</option>
              <option value="Bumper">Bumper</option>
              <option value="Wing">Wing</option>
            </select>
          </label>
          <label>Редкость
            <select id="rarity">
              <option value="None">None</option>
              <option value="Epic">Epic</option>
              <option value="Legendary">Legendary</option>
            </select>
          </label>
          <label>Тип машины
            <select id="carType">
              <option value="None">None</option>
              <option value="Road">Road</option>
              <option value="Sport">Sport</option>
              <option value="Muscle">Muscle</option>
              <option value="Vintage">Vintage</option>
            </select>
          </label>
          <label>Описание
            <textarea id="description" rows="3"></textarea>
          </label>
          <label>Фото
            <input type="file" id="image" accept="image/*" />
          </label>
          <div class="form-actions">
            <button type="submit" id="save-product-btn">Добавить</button>
            <button type="button" id="cancel-edit-btn" class="secondary" hidden>Отмена</button>
          </div>
          <p class="error" id="product-error" hidden></p>
        </form>
      </div>

      <div class="panel">
        <h2>Товары</h2>
        <div id="admin-products" class="admin-list"></div>
      </div>
    </section>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
